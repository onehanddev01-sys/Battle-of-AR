<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Battle of AR</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="panel hero">
        <h1>Battle of AR</h1>
        <p>สร้างห้องด้วยเลขห้องและเล่น Rock Paper Scissors แบบเรียลไทม์ด้วยกล้อง</p>
        <form id="join-form" class="join-form">
          <input id="room-code" maxlength="6" placeholder="เลขห้อง" required />
          <input id="player-name" maxlength="16" placeholder="ชื่อคุณ" required />
          <button type="submit">เข้าห้อง</button>
        </form>
        <div id="status" class="status">รอเข้าห้อง...</div>
      </section>

      <section class="panel game-panel">
        <div class="video-wrap">
          <video id="video" autoplay playsinline muted></video>
          <div id="overlay" class="overlay">เปิดกล้องเพื่อเล่น</div>
        </div>

        <div class="controls">
          <button data-move="rock">✊ Rock</button>
          <button data-move="paper">✋ Paper</button>
          <button data-move="scissors">✌️ Scissors</button>
        </div>

        <div id="room-info" class="room-info"></div>
        <div id="round-info" class="round-info"></div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
