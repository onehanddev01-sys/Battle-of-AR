<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Battle of AR</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <main class="app-shell">
      <section id="menu-screen" class="panel hero">
        <h1>Battle of AR</h1>
        <p>สร้างห้องด้วยเลขห้อง แล้วเลือกโหมดเกมที่ต้องการเล่น</p>

        <form id="create-form" class="join-form">
          <input id="room-code" maxlength="6" placeholder="เลขห้อง" required />
          <input id="player-name" maxlength="16" placeholder="ชื่อคุณ" required />
          <select id="mode-select">
            <option value="rps">เป๋ายิงชับ</option>
            <option value="test">ทดสอบ</option>
            <option value="powerclash">Power Clash</option>
          </select>
          <button type="submit">สร้างห้อง</button>
        </form>

        <form id="join-form" class="join-form secondary-form">
          <input id="join-room-code" maxlength="6" placeholder="เลขห้องที่ต้องการเข้า" required />
          <input id="join-player-name" maxlength="16" placeholder="ชื่อคุณ" required />
          <button type="submit">เข้าห้อง</button>
        </form>

        <div id="status" class="status">เลือกสร้างห้องหรือเข้าห้อง</div>
      </section>

      <section id="game-screen" class="panel game-panel hidden">
        <div class="game-grid">
          <div class="game-side game-side-left">
            <div class="video-wrap">
              <video id="video" autoplay playsinline muted></video>
              <div id="overlay" class="overlay">เปิดกล้องเพื่อเล่น</div>
            </div>
          </div>

          <div class="game-side game-side-right">
            <div class="controls">
              <button id="start-round-button" type="button">▶ เริ่มเทิร์น</button>
              <button data-move="attack">✊ Attack</button>
              <button data-move="guard">✋ Guard</button>
              <button data-move="charge">✌️ Charge</button>
              <button data-move="ultimate">🤟 Ultimate</button>
              <button id="back-button" type="button">กลับเมนู</button>
            </div>

            <div id="result-card" class="result-card hidden">
              <h3 id="result-title">ผลลัพธ์</h3>
              <p id="result-text"></p>
              <button id="replay-button" type="button">เล่นต่อ</button>
            </div>

            <div id="status-bar" class="status-bar"></div>
            <div id="room-info" class="room-info"></div>
            <div id="round-info" class="round-info"></div>
          </div>
        </div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
